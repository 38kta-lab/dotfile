# tmux config — managed by dotfile/init.sh (symlinked to ~/.config/tmux/tmux.conf)
#
# 目的:
#   1. wezterm 上で truecolor を維持
#   2. image.nvim + molten 用の kitty graphics protocol を tmux passthrough で通す
#   3. その他、最小限の操作改善

# --- terminal capabilities ---
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",*256col*:RGB"

# kitty graphics protocol passthrough (wezterm 経由で nvim + image.nvim が画像表示するため)
# 参考: https://github.com/3rd/image.nvim?tab=readme-ov-file#tmux
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# --- usability ---
set -g mouse on
set -g history-limit 50000
set -sg escape-time 10
set -g focus-events on

# index は 1 から (window/pane どちらも human-friendly に)
set -g base-index 1
setw -g pane-base-index 1

# pane border の見やすさ
set -g pane-border-style fg=colour240
set -g pane-active-border-style fg=colour33
