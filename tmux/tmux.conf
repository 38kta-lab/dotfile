# tmux config — managed by dotfile/init.sh (symlinked to ~/.config/tmux/tmux.conf)
#
# 目的:
#   1. wezterm 上で truecolor を維持
#   2. 最小限の操作改善

# --- terminal capabilities ---
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",*256col*:RGB"

# --- usability ---
# `mouse on` は terminal の native 選択 (drag で copy) を奪うため off のまま (default)。
# どうしても tmux 内でのスクロール等を有効化したい場合は wezterm の Option+drag で native 選択になる前提で on も検討可。
set -g history-limit 50000
set -sg escape-time 10
set -g focus-events on

# index は 1 から (window/pane どちらも human-friendly に)
set -g base-index 1
setw -g pane-base-index 1

# pane border の見やすさ
set -g pane-border-style fg=colour240
set -g pane-active-border-style fg=colour33
